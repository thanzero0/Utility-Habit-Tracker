<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker Premium</title>
    <!-- Google Fonts: Inter & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body data-theme="dark">
    <div class="app-container">
        <header>
            <div class="brand"><em>habit</em> tracker</div>
            <div class="header-right">
                <span id="date-display"></span>
            </div>
        </header>

        <main>
            <div class="tracker-card">
                <div class="add-habit-section">
                    <input type="text" id="habit-input" placeholder="Apa habit barumu hari ini?" autocomplete="off">
                    <button id="add-habit-btn" class="primary-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        <span>Tambah</span>
                    </button>
                </div>

                <div class="tracker-table-wrapper">
                    <div class="habits-header" id="habits-header">
                        <div class="header-spacer">Habit</div>
                        <div class="days-header" id="days-labels">
                            <!-- Days will be injected here -->
                        </div>
                        <div class="action-spacer"></div>
                    </div>

                    <ul id="habit-list" class="habit-list">
                        <!-- Habit items will go here -->
                    </ul>
                </div>
            </div>
        </main>
    </div>

    <div class="cursor-glow" id="cursor-glow"></div>
    <script src="js/script.js"></script>
</body>

</html>
